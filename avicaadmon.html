<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvicaAdmon - Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #FBFBFB; --leaf: #8CC63F; --text: #1A1A1A; --soft: #F1F1F1; --water: #55C5D1; --danger: #E74C3C; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        
        /* Navbar Principal */
        .main-nav { background: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--soft); position: sticky; top: 0; z-index: 100; }
        .main-nav h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 0; }
        
        .menu-tabs { display: flex; background: var(--soft); padding: 5px; border-radius: 14px; gap: 5px; }
        .menu-btn { border: none; background: none; padding: 8px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.85rem; color: #666; transition: 0.3s; }
        .menu-btn.active { background: white; color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-logout { color: var(--danger); font-weight: 800; border: 1px solid #FFEDED; border-radius: 10px; padding: 8px 15px; background: none; cursor: pointer; font-size: 0.75rem; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos de Contenido */
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .f-btn { background: white; border: 1px solid var(--soft); padding: 8px 18px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.75rem; }
        .f-btn.active { border-color: var(--text); background: var(--text); color: white; }

        .stat-card { background: white; padding: 30px; border-radius: 24px; text-align: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .stat-card .num { font-size: 4rem; font-weight: 800; display: block; line-height: 1; }
        
        .grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); min-height: 350px; }
        
        .log-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F9F9F9; font-size: 0.9rem; }
        .table-fin { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .table-fin td { padding: 12px 5px; border-bottom: 1px solid #F9F9F9; }
        .money-plus { color: #28a745; font-weight: 800; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <h1>AvicaAdmon</h1>
        <div class="menu-tabs">
            <button class="menu-btn" onclick="switchMainTab('inicio', this)">Inicio</button>
            <button class="menu-btn active" onclick="switchMainTab('servicios', this)">Servicios</button>
            <button class="menu-btn" onclick="switchMainTab('finanzas', this)">Finanzas</button>
        </div>
        <button class="btn-logout" onclick="logout()">SALIR</button>
    </nav>

    <div class="container">
        
        <div class="filter-bar">
            <button class="f-btn" onclick="applyFilter('dia', this)">HOY</button>
            <button class="f-btn active" onclick="applyFilter('semana', this)">ESTA SEMANA</button>
            <button class="f-btn" onclick="applyFilter('mes', this)">ESTE MES</button>
        </div>

        <div id="inicio" class="tab-panel">
            <div class="stat-card">
                <img src="img/logo_cuatro_elementos.png" style="height: 80px; margin-bottom: 20px;">
                <h2 style="font-family:'Playfair Display';">Bienvenido al Panel de Gestión</h2>
                <p style="color:#888;">Monitoreo en tiempo real de <b>Cuatro Elementos</b>.</p>
            </div>
        </div>

        <div id="servicios" class="tab-panel active">
            <div class="stat-card">
                <small style="color:#AAA; text-transform:uppercase; font-weight:700;">Comidas Servidas</small>
                <span class="num" id="servTotal" style="color:var(--leaf)">0</span>
            </div>
            <div class="grid">
                <div class="card"><canvas id="chartServ"></canvas></div>
                <div class="card"><h4 style="margin-top:0">Consumos Recientes</h4><div id="listServ"></div></div>
            </div>
        </div>

        <div id="finanzas" class="tab-panel">
            <div class="stat-card">
                <small style="color:#AAA; text-transform:uppercase; font-weight:700;">Ingresos Totales (Flujo de Caja)</small>
                <span class="num" id="finTotal" style="color:var(--water)">$0.00</span>
            </div>
            <div class="grid">
                <div class="card"><canvas id="chartFin"></canvas></div>
                <div class="card">
                    <h4 style="margin-top:0">Últimas Recargas</h4>
                    <table class="table-fin" id="listFin"></table>
                </div>
            </div>
        </div>

    </div>

<script>
    // --- 1. SEGURIDAD DE SESIÓN ---
    if (localStorage.getItem('avica_session') !== 'active') {
        window.location.href = 'avicalogin.html';
    }

    function logout() {
        localStorage.removeItem('avica_session');
        localStorage.removeItem('avica_user');
        window.location.href = 'avicalogin.html';
    }

    // --- 2. LÓGICA DEL DASHBOARD ---
    let filter = 'semana';
    let cServ, cFin;

    function switchMainTab(id, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id !== 'inicio') update();
    }

    function applyFilter(f, btn) {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = f;
        update();
    }

    async function update() {
        try {
            const r = await fetch(`api/avica_data.php?filter=${filter}&t=${Date.now()}`);
            const d = await r.json();
            
            if(d.success) {
                // Actualizar Servicios
                document.getElementById('servTotal').innerText = d.servicios.total;
                document.getElementById('listServ').innerHTML = d.servicios.lista.map(i => `
                    <div class="log-item"><b>${i.u}</b> <span>${i.t}</span></div>
                `).join('');
                renderChart('chartServ', cServ, d.servicios.labels, d.servicios.values, '#8CC63F', (ch) => cServ = ch);
                
                // Actualizar Finanzas
                document.getElementById('finTotal').innerText = "$" + d.finanzas.total;
                document.getElementById('listFin').innerHTML = d.finanzas.lista.map(i => `
                    <tr><td><b>${i.u}</b><br><small>${i.h}</small></td><td class="money-plus">+$${i.m}</td></tr>
                `).join('');
                renderChart('chartFin', cFin, d.finanzas.labels, d.finanzas.values, '#55C5D1', (ch) => cFin = ch);
            }
        } catch(e) { console.error("Sync Error:", e); }
    }

    function renderChart(id, instance, labels, data, color, callback) {
        const ctx = document.getElementById(id).getContext('2d');
        if(instance) instance.destroy();
        const newChart = new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        callback(newChart);
    }

    // Carga inicial
    window.onload = update;
</script>
</body>
</html>
